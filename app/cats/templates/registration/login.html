<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Connexion</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 40px;
            background: #f7f7f7;
            color: #222;
        }

        .login-card {
            max-width: 420px;
            margin: 80px auto;
            background: white;
            padding: 24px;
            border-radius: 10px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.08);
        }

        input {
            width: 100%;
            padding: 10px;
            margin: 8px 0 16px;
            box-sizing: border-box;
        }

        button,
        a {
            display: inline-block;
            padding: 10px 14px;
            background: #2f6fed;
            color: white;
            border: none;
            border-radius: 6px;
            text-decoration: none;
            cursor: pointer;
        }

        .error {
            color: #b00020;
        }

        .back-link {
            margin-top: 16px;
            background: #555;
        }
    </style>
</head>

<body>
    <div class="login-card">
        <h1>Connexion</h1>

        {% if form.errors %}
            <p class="error">Identifiants incorrects.</p>
        {% endif %}

        <form method="post">
            {% csrf_token %}
            {{ form.as_p }}

            <button type="submit">Se connecter</button>
        </form>

        <p>
            <a class="back-link" href="/">Retour au dashboard</a>
        </p>
    </div>
</body>
</html>
